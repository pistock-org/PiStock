<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiStock — Vue 3D</title>
    <link rel="stylesheet" href="/css/style.css">

    <!-- model-viewer : web component de Google qui affiche un .glb
         avec controles orbital + zoom, en une seule balise HTML.
         Charge depuis le CDN officiel. -->
    <script type="module"
            src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>
</head>
<body>
    <header>
        <h1>📦 PiStock — Vue 3D</h1>
    </header>

    <main>
        <div class="viewer-header">
            <a href="/" class="back-button">← Retour à la liste</a>
            <div class="viewer-title" id="part-title">Chargement…</div>
        </div>

        <div class="viewer-container" id="viewer-container">
            <!-- model-viewer sera injecté ici par part.js -->
        </div>

        <div class="viewer-meta" id="viewer-meta"></div>
    </main>

    <script src="/js/part.js"></script>
</body>
</html>
