<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- PiStock app icon : a stylized stock crate with a wrench -->
  <rect width="512" height="512" fill="#292524" rx="80"/>
  <!-- Crate body -->
  <rect x="96" y="160" width="320" height="240"
        fill="none" stroke="#fbbf24" stroke-width="20"
        stroke-linejoin="round"/>
  <!-- Crate slats -->
  <line x1="96" y1="240" x2="416" y2="240"
        stroke="#fbbf24" stroke-width="14"/>
  <line x1="96" y1="320" x2="416" y2="320"
        stroke="#fbbf24" stroke-width="14"/>
  <!-- Top lid -->
  <line x1="96" y1="160" x2="416" y2="160"
        stroke="#fbbf24" stroke-width="20"/>
  <!-- "P" letter on top-left for "PiStock" -->
  <text x="256" y="135" text-anchor="middle"
        font-family="sans-serif" font-weight="700" font-size="90"
        fill="#fbbf24">P</text>
</svg>
