<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Part container (dashed rounded box) -->
  <rect x="6" y="6" width="52" height="52" rx="6" ry="6"
        fill="#e0f2fe" stroke="#2563eb" stroke-width="3"
        stroke-dasharray="6 4"/>
  <!-- Two bodies wrapped inside -->
  <rect x="14" y="30" width="18" height="18" rx="2"
        fill="#f59e0b" stroke="#b45309" stroke-width="1.5"/>
  <rect x="32" y="22" width="18" height="18" rx="2"
        fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <!-- Grouping arrows pointing inward (top corners) -->
  <path d="M14 16 L22 16 M14 16 L14 24" fill="none"
        stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <path d="M50 16 L42 16 M50 16 L50 24" fill="none"
        stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
</svg>
