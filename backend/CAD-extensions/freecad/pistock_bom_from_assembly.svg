<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#292524" rx="10"/>
  <!-- Cube isométrique à gauche (l'assemblage) -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round" fill="none">
    <!-- Face avant -->
    <path d="M8 22 L8 40 L20 46 L20 28 Z"/>
    <!-- Face supérieure -->
    <path d="M8 22 L20 16 L32 22 L20 28 Z"/>
    <!-- Face droite -->
    <path d="M20 28 L20 46 L32 40 L32 22 Z"/>
  </g>
