  <path d="M36 32 L48 32 M44 28 L48 32 L44 36"
        fill="none" stroke="#fbbf24" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Liste à puces à droite -->
  <circle cx="40" cy="16" r="1.8" fill="#fbbf24"/>
  <line x1="46" y1="16" x2="58" y2="16"
        stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="48" r="1.8" fill="#fbbf24"/>
  <line x1="46" y1="48" x2="58" y2="48"
        stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="56" r="1.8" fill="#fbbf24"/>
  <line x1="46" y1="56" x2="58" y2="56"
        stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
</svg>
